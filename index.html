<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Počítačové sítě — Interaktivní kurz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a56db;--blue-h:#1d4ed8;--blue-50:#eff6ff;--blue-100:#dbeafe;--blue-200:#bfdbfe;--blue-dark:#1e40af;--blue-text:#042c53;
  --bg:#f0f4ff;--white:#fff;--text:#111827;--sec:#6b7280;--hint:#9ca3af;
  --border:#dbeafe;--border2:#bfdbfe;
  --green-bg:#f0fdf4;--green-b:#bbf7d0;--green-t:#14532d;--green-m:#16a34a;
  --amber-bg:#fffbeb;--amber-b:#fde68a;--amber-t:#78350f;--amber-m:#d97706;
  --red-bg:#fef2f2;--red-b:#fecaca;--red-t:#991b1b;--red-m:#dc2626;
  --purple-bg:#faf5ff;--purple-t:#5b21b6;
  --r:8px;--rl:12px;--rxl:14px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;padding:1.5rem 1rem}
.page{max-width:740px;margin:0 auto}

/* HEADER */
.hdr{background:var(--blue);border-radius:var(--rxl);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:14px}
.hdr-icon{width:42px;height:42px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-icon svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr h1{font-size:16px;font-weight:600;color:#fff;margin-bottom:2px}
.hdr p{font-size:12px;color:rgba(255,255,255,.7)}

/* PROGRESS */
.prog{background:var(--white);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:1rem;border:1px solid var(--border)}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-lbl{font-size:11px;font-weight:600;color:var(--sec);text-transform:uppercase;letter-spacing:.06em}
.prog-pct{font-size:12px;font-weight:600;color:var(--blue)}
.prog-track{height:6px;background:var(--blue-100);border-radius:3px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#3b82f6);border-radius:3px;transition:width .5s ease}
.snav{display:flex;gap:5px;flex-wrap:wrap}
.sb{padding:4px 10px;font-size:11px;font-weight:500;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--sec);cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap}
.sb:hover:not([disabled]){background:var(--blue-50);color:var(--blue-dark)}
.sb.done{background:var(--blue-50);color:var(--blue-dark);border-color:var(--blue-200)}
.sb.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.sb[disabled]{opacity:.35;cursor:default}

/* LESSON CARD */
.lcard{background:var(--white);border-radius:var(--rxl);overflow:hidden;border:1px solid var(--border);margin-bottom:1rem;box-shadow:0 1px 3px rgba(26,86,219,.06)}
.lhead{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--blue-50)}
.lbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:.625rem}
.lbadge .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7}
.b-intro{background:var(--blue-50);color:var(--blue-dark)}
.b-sim{background:var(--green-bg);color:#166534}
.b-deep{background:var(--purple-bg);color:var(--purple-t)}
.b-eth{background:var(--amber-bg);color:#92400e}
.b-prot{background:var(--blue-50);color:var(--blue-dark)}
.b-addr{background:var(--green-bg);color:#166534}
.b-wifi{background:var(--purple-bg);color:var(--purple-t)}
.b-inet{background:var(--red-bg);color:#9f1239}
.b-quiz{background:#fdf4ff;color:#6b21a8}
.ltitle{font-size:19px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3}
.lsub{font-size:13px;color:var(--sec)}
.lbody{padding:1.25rem 1.5rem}

/* CONTENT */
.txt{font-size:14px;line-height:1.75;margin-bottom:1rem;color:var(--text)}
.txt p{margin-bottom:.75rem}.txt p:last-child{margin:0}
.txt strong{font-weight:600}

.hl{border-radius:10px;padding:.75rem 1rem;margin-bottom:1rem;font-size:13px;line-height:1.6;display:flex;gap:10px;align-items:flex-start}
.hl-icon{width:18px;height:18px;flex-shrink:0;margin-top:1px}
.hl strong{font-weight:600}
.hl-blue{background:var(--blue-50);color:var(--blue-text);border:1px solid var(--blue-200)}
.hl-green{background:var(--green-bg);color:var(--green-t);border:1px solid var(--green-b)}
.hl-amber{background:var(--amber-bg);color:var(--amber-t);border:1px solid var(--amber-b)}
.hl-red{background:var(--red-bg);color:var(--red-t);border:1px solid var(--red-b)}

.def-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px;margin-bottom:1rem}
.def-card{background:var(--blue-50);border:1px solid var(--border);border-radius:var(--r);padding:.75rem}
.def-term{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.def-val{font-size:13px;line-height:1.5;color:var(--text)}

.info-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:1rem;border-radius:var(--r);overflow:hidden}
.info-table th{background:var(--blue-50);padding:8px 12px;text-align:left;font-weight:600;font-size:12px;color:var(--blue-dark);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border)}
.info-table td{padding:8px 12px;border-bottom:1px solid var(--blue-50);color:var(--text)}
.info-table tr:last-child td{border-bottom:none}
.info-table tr:nth-child(even) td{background:var(--blue-50)}

/* CANVAS */
.cvs-wrap{border-radius:var(--rl);overflow:hidden;border:1px solid var(--border);background:var(--blue-50);margin-bottom:1rem}
.cvs-wrap canvas{width:100%;display:block}
.cvs-hint{font-size:11px;color:var(--hint);text-align:center;padding:5px 0 7px}

/* CONTROLS */
.status-bar{font-size:13px;color:var(--sec);padding:.5rem 1rem;background:var(--blue-50);border:1px solid var(--border);border-radius:var(--r);margin-bottom:.75rem;min-height:38px;line-height:1.5}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem}
.btn{padding:8px 16px;font-size:13px;font-weight:500;border-radius:var(--r);cursor:pointer;transition:all .15s;font-family:inherit}
.btn-p{background:var(--blue);color:#fff;border:none}.btn-p:hover{background:var(--blue-h)}.btn-p:disabled{opacity:.4;cursor:default}
.btn-d{background:#fff;color:var(--red-m);border:1px solid var(--red-b)}.btn-d:hover{background:var(--red-bg)}
.btn-ok{background:#fff;color:var(--green-m);border:1px solid var(--green-b)}.btn-ok:hover{background:var(--green-bg)}
.btn-g{background:#fff;color:var(--text);border:1px solid var(--border2)}.btn-g:hover{background:var(--blue-50)}.btn-g:disabled{opacity:.35;cursor:default}

.log-box{font-size:11px;font-family:monospace;max-height:80px;overflow-y:auto;padding:6px 10px;background:var(--blue-50);border:1px solid var(--border);border-radius:var(--r);margin-bottom:.75rem}
.lg{padding:1.5px 0;border-bottom:1px solid var(--border)}.lg:last-child{border:none}
.lg.ok{color:var(--green-m)}.lg.err{color:var(--red-m)}.lg.info{color:var(--blue)}.lg.warn{color:var(--amber-m)}

/* STEP PILLS */
.spills{display:flex;gap:4px;margin-bottom:.875rem}
.sp{width:28px;height:4px;border-radius:2px;background:var(--blue-100);transition:background .3s}
.sp.done{background:var(--blue-200)}.sp.on{background:var(--blue)}
.expl-card{border:1px solid var(--border);border-radius:var(--rl);padding:.875rem 1rem;margin-bottom:.875rem;background:var(--blue-50)}
.expl-num{font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.expl-title{font-size:14px;font-weight:600;margin-bottom:5px;color:var(--text)}
.expl-desc{font-size:13px;line-height:1.6;color:var(--sec)}
.expl-nav{display:flex;gap:8px;margin-bottom:1rem}

/* COMPARE TABS */
.topo-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.875rem}
.topo-pill{padding:5px 14px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid var(--border2);background:#fff;cursor:pointer;font-family:inherit;color:var(--sec);transition:all .15s}
.topo-pill.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.topo-pill:hover:not(.on){background:var(--blue-50);color:var(--blue-dark)}

/* QUIZ */
.q-prog-wrap{height:4px;background:var(--blue-100);border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.q-prog{height:100%;background:var(--blue);border-radius:2px;transition:width .3s}
.q-meta{font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.q-text{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:1rem;color:var(--text)}
.q-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:.875rem}
.q-opt{padding:10px 14px;border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;font-size:13px;font-family:inherit;background:#fff;color:var(--text);text-align:left;transition:all .1s;line-height:1.4}
.q-opt:hover:not([disabled]){background:var(--blue-50);border-color:var(--blue-200)}
.q-opt.correct{background:var(--green-bg);border-color:var(--green-m);color:var(--green-t)}
.q-opt.wrong{background:var(--red-bg);border-color:var(--red-m);color:var(--red-t)}
.q-exp{font-size:13px;color:var(--blue-dark);line-height:1.6;padding:10px 14px;background:var(--blue-50);border-radius:var(--r);margin-bottom:.875rem;border-left:3px solid var(--blue)}
.qdot{width:10px;height:10px;border-radius:50%;background:var(--blue-100);display:inline-block}
.qdot.ok{background:var(--green-m)}.qdot.bad{background:var(--red-m)}

/* LESSON NAV */
.lnav{display:flex;justify-content:space-between;align-items:center;padding:.875rem 1.5rem;border-top:1px solid var(--blue-50);background:var(--blue-50)}
.lnav-pos{font-size:12px;color:var(--hint)}

/* COMPLETE */
.complete{text-align:center;padding:2.5rem 1rem}
.complete-star{font-size:56px;margin-bottom:.75rem;line-height:1}
.complete-title{font-size:22px;font-weight:700;margin-bottom:.5rem}
.complete-score{font-size:42px;font-weight:700;color:var(--blue);margin-bottom:.5rem}
.complete-sub{font-size:14px;color:var(--sec);max-width:400px;margin:0 auto 1.5rem;line-height:1.6}
.slabel{font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}

/* OSI table special */
.osi-row{display:grid;grid-template-columns:32px 1fr 1fr 1fr;gap:6px;align-items:center;padding:6px 8px;border-radius:6px;margin-bottom:4px;font-size:12px}
.osi-num{font-weight:700;font-size:14px;text-align:center}
</style>
</head>
<body>
<div class="page">

<div id="toast" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.18);transition:opacity .3s"></div>
<div class="hdr">
  <div class="hdr-icon">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><line x1="12" y1="9" x2="12" y2="3"/><line x1="15.18" y1="10.5" x2="20.66" y2="7.5"/><line x1="15.18" y1="13.5" x2="20.66" y2="16.5"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="8.82" y1="13.5" x2="3.34" y2="16.5"/><line x1="8.82" y1="10.5" x2="3.34" y2="7.5"/></svg>
  </div>
  <div style="flex:1">
    <h1>Počítačové sítě — interaktivní kurz</h1>
    <p>Interaktivní kurz pro pochopení problematiky počítačových sítí</p>
  </div>
  <button onclick="confirmReset()" title="Resetovat postup" style="background:rgba(255,255,255,.12);border:none;border-radius:8px;padding:7px 10px;cursor:pointer;color:#fff;font-size:11px;font-weight:500;font-family:inherit;white-space:nowrap;flex-shrink:0" onmouseover="this.style.background='rgba(255,255,255,.22)'" onmouseout="this.style.background='rgba(255,255,255,.12)'">↺ Reset</button>
</div>

<div class="prog">
  <div class="prog-top"><span class="prog-lbl">Postup kurzem</span><span class="prog-pct" id="progPct">0 %</span></div>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="snav" id="stepsNav"></div>
</div>

<div class="lcard" id="lessonCard"></div>

</div>
<script>
const lerp=(a,b,t)=>a+(b-a)*t;
const v=(x,y)=>({x,y});
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const SL=['A','B','C','D','E','F'];

function getT(){
  return{bg:'#ffffff',bg2:'#eff6ff',text:'#111827',sec:'#6b7280',hint:'#9ca3af',border:'#dbeafe',border2:'#bfdbfe',blue:'#1a56db',blueDark:'#1e40af'};
}

function hlIcon(t){
  const icons={
    info:`<svg class="hl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    check:`<svg class="hl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
    warn:`<svg class="hl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    key:`<svg class="hl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="15" r="5"/><line x1="12.22" y1="11.22" x2="22" y2="2"/><line x1="22" y1="2" x2="22" y2="7"/><line x1="18" y1="2" x2="18" y2="7"/></svg>`
  };
  return icons[t]||icons.info;
}

/* ══════════════════════════════════════════════════════
   LESSONS DEFINITION
══════════════════════════════════════════════════════ */
const LESSONS=[
  {id:'intro',   badge:'b-intro', bTxt:'Úvod',           title:'Co jsou počítačové sítě?',         sub:'Definice, důvody zavádění a rozdělení'},
  {id:'topo',    badge:'b-sim',   bTxt:'Interaktivní',   title:'Topologie počítačových sítí',       sub:'STAR, BUS, RING — simulace a srovnání'},
  {id:'eth',     badge:'b-eth',   bTxt:'Fyzická vrstva', title:'Ethernet a kabeláž',               sub:'Přenosová média, standardy, rámec'},
  {id:'prvky',   badge:'b-deep',  bTxt:'Zařízení',       title:'Aktivní síťové prvky',             sub:'Repeater, hub, switch, router, gateway'},
  {id:'osi',     badge:'b-prot',  bTxt:'Modely',         title:'OSI model a TCP/IP',               sub:'Vrstvy, protokoly, zapouzdření dat'},
  {id:'addr',    badge:'b-addr',  bTxt:'Adresování',     title:'Adresování v sítích',              sub:'MAC, IPv4, IPv6, DNS, DHCP, porty'},
  {id:'wifi',    badge:'b-wifi',  bTxt:'Bezdrátové',     title:'Bezdrátové sítě',                  sub:'WiFi, Bluetooth, standardy IEEE 802.11'},
  {id:'inet',    badge:'b-inet',  bTxt:'Internet',       title:'Internet a jeho služby',           sub:'WWW, e-mail, cloud, protokoly'},
  {id:'quiz',    badge:'b-quiz',  bTxt:'Kvíz',           title:'Ověř si znalosti',                 sub:'10 otázek ze všech kapitol'},
];

let curL=0;
const done=new Set();
let qResults=[];
let qOrder=[];  // shuffled question order

// ── localStorage persistence ──────────────────────────────────────────────
const LS_KEY='pcsite_v1';
function saveState(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify({
      curL,
      done:[...done],
      qResults,
      qOrder
    }));
  }catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return false;
    const s=JSON.parse(raw);
    curL=s.curL||0;
    (s.done||[]).forEach(i=>done.add(i));
    qResults=s.qResults||[];
    qOrder=s.qOrder||[];
    // Rebuild qShuffledOpts from saved qOrder (deterministic seed not needed —
    // we re-shuffle opts; quiz results already stored so review still works)
    if(qOrder.length===QS.length){
      qShuffledOpts=qOrder.map(qi=>{
        const q=QS[qi];
        return shuffle(q.opts.map((_,i)=>i));
      });
    }
    return true;
  }catch(e){return false;}
}
function clearState(){
  try{localStorage.removeItem(LS_KEY);}catch(e){}
}

function updateProg(){
  const pct=Math.round(done.size/LESSONS.length*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+' %';
  document.getElementById('stepsNav').innerHTML=LESSONS.map((l,i)=>{
    const isDone=done.has(i),isActive=i===curL,isLocked=i>0&&!done.has(i-1)&&!isDone&&!isActive;
    const lbl=(isDone?'✓ ':'')+(i+1)+'. '+l.title.split('—')[0].split('a ')[0].trim();
    return`<button class="sb${isDone?' done':''}${isActive?' active':''}" ${isLocked?'disabled':''} onclick="goL(${i})">${lbl}</button>`;
  }).join('');
}

function goL(i){if(i>0&&!done.has(i-1)&&!done.has(i)&&i!==curL)return;curL=i;saveState();render();updateProg();window.scrollTo({top:0,behavior:'smooth'});}
function completeNext(){done.add(curL);saveState();if(curL<LESSONS.length-1){curL++;render();}else{renderComplete();}updateProg();window.scrollTo({top:0,behavior:'smooth'});}

function render(){
  const l=LESSONS[curL];const isLast=curL===LESSONS.length-1;
  let body='';
  const bMap={intro:bIntro,topo:bTopo,eth:bEth,prvky:bPrvky,osi:bOsi,addr:bAddr,wifi:bWifi,inet:bInet,quiz:bQuiz};
  body=(bMap[l.id]||bIntro)();
  document.getElementById('lessonCard').innerHTML=
    `<div class="lhead"><div class="lbadge ${l.badge}"><div class="dot"></div>${l.bTxt}</div><div class="ltitle">${l.title}</div><div class="lsub">${l.sub}</div></div>`+
    `<div class="lbody">${body}</div>`+
    `<div class="lnav"><button class="btn btn-g" ${curL===0?'disabled':''} onclick="goL(${curL-1})">← Zpět</button><span class="lnav-pos">${curL+1} / ${LESSONS.length}</span><button class="btn btn-p" id="nextLBtn" onclick="completeNext()">${isLast?'Dokončit kurz ✓':'Další lekce →'}</button></div>`;
  setTimeout(()=>postRender(l.id),40);
}

/* ══════════════════════════════════════
   LEKCE 1 — ÚVOD
══════════════════════════════════════ */
function bIntro(){return`
<div class="txt"><p>Počítačová síť vzniká spojením dvou a více počítačů tak, aby mohli uživatelé sdílet prostředky — softwarové i hardwarové. Komunikace probíhá formou zpráv posílaných ze zdroje k příjemci.</p></div>
<div class="hl hl-blue">${hlIcon('info')}<div><strong>Proč sítě?</strong> Kolektivní práce s dokumenty, sdílení tiskáren, přenos dat, e-mail, vzdálená správa — to jsou hlavní důvody zavádění počítačových sítí.</div></div>
<div class="def-grid">
  <div class="def-card"><div class="def-term">LAN</div><div class="def-val">Lokální síť — stovky metrů až kilometry. Škola, kancelář, domácnost. Vysoká přenosová rychlost.</div></div>
  <div class="def-card"><div class="def-term">MAN</div><div class="def-val">Metropolitní síť — velikost města, dosah až 80 km. Propojuje více LAN sítí.</div></div>
  <div class="def-card"><div class="def-term">WAN</div><div class="def-val">Rozlehlá síť — města, státy, kontinenty. Nižší rychlost než LAN. Příklad: Internet.</div></div>
  <div class="def-card"><div class="def-term">PAN</div><div class="def-val">Osobní síť — dosah jen pár metrů. Bluetooth, WiFi, USB pro mobilní zařízení.</div></div>
</div>
<div class="txt"><p>Sítě se rozdělují také podle <strong>topologie</strong> (způsobu zapojení uzlů) a podle <strong>role prvků</strong> — buď jako <strong>Klient-Server</strong> (jeden server obsluhuje mnoho klientů) nebo jako <strong>Peer-to-peer</strong> (každý uzel je rovnocenný).</p></div>
<table class="info-table">

const TOPO_DESC={
  star:`<div>${hlIcon('info')}<div><strong>STAR (hvězda):</strong> Každé PC je propojeno samostatným kabelem přímo se switchem. Veškerá komunikace prochází centrem. Switch posílá data jen správnému příjemci pomocí CAM tabulky (MAC adresy → port).</div></div>`,
  bus:`<div>${hlIcon('info')}<div><strong>BUS (sběrnice):</strong> Všechna PC sdílejí jeden kabel. Na koncích jsou terminátory (50 Ω). Přístup k médiu řídí <strong>CSMA/CD</strong> — před odesláním uzel naslouchá, zda je médium volné. Při kolizi oba uzly čekají náhodnou dobu.</div></div>`,
  ring:`<div>${hlIcon('info')}<div><strong>RING (kruh):</strong> Každé PC je propojeno s předchozím a následujícím. Data putují jedním směrem. Přístup řídí <strong>token (žeton)</strong> — vysílat smí jen ten, kdo drží token. Žádné kolize, deterministická latence.</div></div>`
};

function setTopoSim(t,el){
  topoMode=t;
  document.querySelectorAll('.topo-pill').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  const desc=document.getElementById('topoDesc');if(desc)desc.innerHTML=TOPO_DESC[t]||'';
  starSel=[];busSel=[];ringSel=[];starPkt=null;busPkt=null;ringPkt=null;starFailed=false;busFailed=false;ringFailed=false;
  document.getElementById('topoSend').disabled=true;
  document.getElementById('topoFail').textContent='Simulovat výpadek';document.getElementById('topoFail').className='btn btn-d';
  document.getElementById('topoStat').textContent='Klikni na libovolné PC.';
  postRenderTopo();
}

function tLog(m,t='info'){const b=document.getElementById('topoLog');if(!b)return;const e=document.createElement('div');e.className='lg '+t;e.textContent='› '+m;b.prepend(e);while(b.children.length>20)b.lastChild.remove();}

function topoNodes(t,W,H){
  if(t==='star'){const h=v(W/2,H/2-8);const ns=[h];for(let i=0;i<6;i++){const a=-Math.PI/2+i*Math.PI/3;ns.push(v(W/2+115*Math.cos(a),H/2-8+100*Math.sin(a)))}return ns;}
  if(t==='bus'){
    // 3 PCs above bus, 3 below — bus runs at H/2
    const by=H/2;
    const xs=[W*0.12, W*0.38, W*0.62, W*0.22, W*0.50, W*0.78];
    const ys=[by-75, by-75, by-75, by+75, by+75, by+75];
    return xs.map((x,i)=>v(x,ys[i]));
  }
  if(t==='ring'){const ns=[];for(let i=0;i<6;i++){const a=-Math.PI/2+i*Math.PI/3;ns.push(v(W/2+120*Math.cos(a),H/2+6+106*Math.sin(a)))}return ns;}
}

function drawPC(ctx,n,lbl,st){
  const T=getT();
  const fill=st==='src'?'#dcfce7':st==='dst'?'#dbeafe':'#ffffff';
  const stroke=st==='src'?'#16a34a':st==='dst'?'#1a56db':'#bfdbfe';
  ctx.beginPath();ctx.arc(n.x,n.y,17,0,Math.PI*2);ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=st==='normal'?1:2;ctx.stroke();
  ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(n.x-7,n.y-6,14,9,2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(n.x-4,n.y+3);ctx.lineTo(n.x+4,n.y+3);ctx.moveTo(n.x,n.y+3);ctx.lineTo(n.x,n.y+6);ctx.moveTo(n.x-4,n.y+6);ctx.lineTo(n.x+4,n.y+6);ctx.stroke();
  ctx.fillStyle=st==='normal'?T.hint:stroke;ctx.font='500 10px Inter,system-ui';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('PC-'+lbl,n.x,n.y+21);
}

function drawPkt(ctx,p,col='#1a56db'){ctx.beginPath();ctx.arc(p.x,p.y,9,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();ctx.beginPath();ctx.arc(p.x,p.y,15,0,Math.PI*2);ctx.strokeStyle=col.replace(')',', .2)').replace('rgb','rgba');ctx.lineWidth=2;ctx.stroke();}

function postRenderTopo(){
  const c=document.getElementById('topoC');if(!c)return;
  const W=c.width,H=c.height;const ctx=c.getContext('2d');
  c.onclick=null;
  const desc=document.getElementById('topoDesc');if(desc)desc.innerHTML=TOPO_DESC[topoMode]||'';
  if(topoMode==='star'){
    starN=topoNodes('star',W,H);
    c.onclick=e=>{if(starPkt)return;const r=c.getBoundingClientRect();const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);let hi=-1;for(let i=1;i<starN.length;i++)if(dist(starN[i],{x:mx,y:my})<20)hi=i;if(hi<0)return;const lbl=SL[hi-1];if(starSel.length===0){starSel=[hi];topoStat('Odesílatel: PC-'+lbl+'. Klikni na příjemce.');}else if(starSel.length===1){if(starSel[0]===hi){starSel=[];topoStat('Klikni na odesílatele.');}else{starSel=[starSel[0],hi];topoStat('PC-'+SL[starSel[0]-1]+' → PC-'+lbl+'. Stiskni Odeslat ▶');document.getElementById('topoSend').disabled=false;}}else{starSel=[hi];document.getElementById('topoSend').disabled=true;topoStat('Odesílatel: PC-'+lbl);}drawTopo(ctx,W,H,null);};
    drawTopo(ctx,W,H,null);
  } else if(topoMode==='bus'){
    busN=topoNodes('bus',W,H);
    c.onclick=e=>{if(busPkt)return;const r=c.getBoundingClientRect();const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);let hi=-1;for(let i=0;i<busN.length;i++)if(dist(busN[i],{x:mx,y:my})<20)hi=i;if(hi<0)return;const lbl=SL[hi];if(busSel.length===0){busSel=[hi];topoStat('Odesílatel: PC-'+lbl+'. Klikni na příjemce.');}else if(busSel.length===1){if(busSel[0]===hi){busSel=[];topoStat('Klikni na odesílatele.');}else{busSel=[busSel[0],hi];topoStat('PC-'+SL[busSel[0]]+' → PC-'+lbl+'. Stiskni Odeslat ▶');document.getElementById('topoSend').disabled=false;}}else{busSel=[hi];document.getElementById('topoSend').disabled=true;topoStat('Odesílatel: PC-'+lbl);}drawTopo(ctx,W,H,null);};
    drawTopo(ctx,W,H,null);
  } else {
    ringN=topoNodes('ring',W,H);
    c.onclick=e=>{if(ringPkt)return;const r=c.getBoundingClientRect();const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);let hi=-1;for(let i=0;i<ringN.length;i++)if(dist(ringN[i],{x:mx,y:my})<20)hi=i;if(hi<0)return;const lbl=SL[hi];if(ringSel.length===0){ringSel=[hi];topoStat('Odesílatel: PC-'+lbl+'. Klikni na příjemce.');}else if(ringSel.length===1){if(ringSel[0]===hi){ringSel=[];topoStat('Klikni na odesílatele.');}else{ringSel=[ringSel[0],hi];topoStat('PC-'+SL[ringSel[0]]+' → PC-'+lbl+'. Stiskni Odeslat ▶');document.getElementById('topoSend').disabled=false;}}else{ringSel=[hi];document.getElementById('topoSend').disabled=true;topoStat('Odesílatel: PC-'+lbl);}drawTopo(ctx,W,H,null);};
    drawTopo(ctx,W,H,null);
  }
  const d=document.getElementById('topoDesc');if(d)d.innerHTML=TOPO_DESC[topoMode]||'';
}

function drawTopo(ctx,W,H,pkt){
  ctx.clearRect(0,0,W,H);ctx.setLineDash([]);
  if(topoMode==='star'){
    const failed=starFailed;
    for(let i=1;i<starN.length;i++){ctx.beginPath();ctx.moveTo(starN[0].x,starN[0].y);ctx.lineTo(starN[i].x,starN[i].y);ctx.strokeStyle=failed?'#fca5a5':'#bfdbfe';ctx.lineWidth=1.5;ctx.setLineDash(failed?[6,4]:[]);ctx.stroke();ctx.setLineDash([]);}
    ctx.beginPath();ctx.arc(starN[0].x,starN[0].y,24,0,Math.PI*2);ctx.fillStyle=failed?'#fef2f2':'#eff6ff';ctx.fill();ctx.strokeStyle=failed?'#dc2626':'#1a56db';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=failed?'#dc2626':'#1e40af';ctx.font='600 9px Inter,system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(failed?'OFFLINE':'Switch',starN[0].x,starN[0].y-1);
    if(!failed){ctx.fillStyle='#3b82f6';ctx.font='500 8px Inter,system-ui';ctx.fillText('CAM',starN[0].x,starN[0].y+10);}
    for(let i=1;i<starN.length;i++)drawPC(ctx,starN[i],SL[i-1],starSel[0]===i?'src':starSel[1]===i?'dst':'normal');
    if(pkt)drawPkt(ctx,pkt);
  } else if(topoMode==='bus'){
    const failed=busFailed;const by=H/2;
    // Draw stubs from bus to each PC
    ctx.strokeStyle=failed?'#fca5a5':'#bfdbfe';ctx.lineWidth=1.5;
    busN.forEach(n=>{
      ctx.beginPath();ctx.moveTo(n.x,by);ctx.lineTo(n.x,n.y+(n.y<by?17:-17));ctx.stroke();
    });
    // Draw main bus line
    ctx.strokeStyle=failed?'#dc2626':'#1a56db';ctx.lineWidth=3;ctx.setLineDash(failed?[8,5]:[]);
    ctx.beginPath();ctx.moveTo(16,by);ctx.lineTo(W-16,by);ctx.stroke();ctx.setLineDash([]);
    // Terminators
    [16,W-16].forEach(tx=>{
      ctx.beginPath();ctx.arc(tx,by,8,0,Math.PI*2);ctx.fillStyle='#1a56db';ctx.fill();
      ctx.fillStyle='#fff';ctx.font='700 8px Inter,system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('T',tx,by);
    });
    // T-connectors on bus at each PC position
    if(!failed){busN.forEach(n=>{
      ctx.beginPath();ctx.arc(n.x,by,4,0,Math.PI*2);ctx.fillStyle='#93c5fd';ctx.fill();
      ctx.strokeStyle='#1a56db';ctx.lineWidth=1;ctx.stroke();
    });}
    busN.forEach((n,i)=>drawPC(ctx,n,SL[i],busSel[0]===i?'src':busSel[1]===i?'dst':'normal'));
    if(pkt)drawPkt(ctx,pkt,'#16a34a');
  } else {
    const failed=ringFailed;
    for(let i=0;i<ringN.length;i++){const nxt=(i+1)%ringN.length;ctx.beginPath();ctx.moveTo(ringN[i].x,ringN[i].y);ctx.lineTo(ringN[nxt].x,ringN[nxt].y);ctx.strokeStyle=failed?'#fca5a5':'#bfdbfe';ctx.lineWidth=1.5;ctx.setLineDash(failed?[6,4]:[]);ctx.stroke();ctx.setLineDash([]);if(!failed){const mx=(ringN[i].x+ringN[nxt].x)/2,my=(ringN[i].y+ringN[nxt].y)/2;const ang=Math.atan2(ringN[nxt].y-ringN[i].y,ringN[nxt].x-ringN[i].x);ctx.save();ctx.translate(mx,my);ctx.rotate(ang);ctx.beginPath();ctx.moveTo(-5,-4);ctx.lineTo(5,0);ctx.lineTo(-5,4);ctx.strokeStyle='#d97706';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();}}
    ringN.forEach((n,i)=>drawPC(ctx,n,SL[i],ringSel[0]===i?'src':ringSel[1]===i?'dst':'normal'));
    if(pkt)drawPkt(ctx,pkt,'#d97706');
  }
}

function topoStat(t){const el=document.getElementById('topoStat');if(el)el.textContent=t;}

function animPath(pts,col,done){
  const c=document.getElementById('topoC');if(!c)return;
  const W=c.width,H=c.height;const ctx=c.getContext('2d');
  let si=0,t=0;
  function fr(){t+=0.007;if(t>=1){t=0;si++;if(si>=pts.length-1){done();return;}}
    const p={x:lerp(pts[si].x,pts[si+1].x,t),y:lerp(pts[si].y,pts[si+1].y,t)};
    drawTopo(ctx,W,H,p);requestAnimationFrame(fr);
  }
  requestAnimationFrame(fr);
}

function topoSend(){
  if(topoMode==='star'){
    if(starFailed){tLog('Switch je offline!','err');return;}
    if(starSel.length<2)return;
    const src=starN[starSel[0]],dst=starN[starSel[1]];
    const sl=SL[starSel[0]-1],dl=SL[starSel[1]-1];
    document.getElementById('topoSend').disabled=true;
    tLog('PC-'+sl+' odesílá rámec na switch...','info');
    animPath([src,starN[0]],null,()=>{
      tLog('Switch vyhledal MAC → port PC-'+dl,'warn');
      animPath([starN[0],dst],null,()=>{tLog('PC-'+dl+' přijal rámec ✓','ok');topoStat('Doručeno!');starSel=[];document.getElementById('topoSend').disabled=true;const c=document.getElementById('topoC');if(c)drawTopo(c.getContext('2d'),c.width,c.height,null);});
    });
  } else if(topoMode==='bus'){
    if(busFailed){tLog('Sběrnice přerušena!','err');return;}
    if(busSel.length<2)return;
    const src=busN[busSel[0]],dst=busN[busSel[1]];
    const sl=SL[busSel[0]],dl=SL[busSel[1]];
    const by=300/2;
    document.getElementById('topoSend').disabled=true;
    tLog('PC-'+sl+' naslouchá (CSMA)... médium volné','info');
    busPkt={x:src.x,y:src.y};
    setTimeout(()=>{tLog('PC-'+sl+' vysílá broadcast po sběrnici...','warn');
      animPath([src,v(src.x,by),v(dst.x,by),dst],null,()=>{tLog('PC-'+dl+' přijal rámec ✓','ok');topoStat('Doručeno!');busSel=[];busPkt=null;document.getElementById('topoSend').disabled=true;const c=document.getElementById('topoC');if(c)drawTopo(c.getContext('2d'),c.width,c.height,null);});
    },500);
  } else {
    if(ringFailed){tLog('Kruh přerušen!','err');return;}
    if(ringSel.length<2)return;
    const sl=SL[ringSel[0]],dl=SL[ringSel[1]];
    document.getElementById('topoSend').disabled=true;
    tLog('PC-'+sl+' čeká na token...','info');
    const n=ringN.length;const path=[ringN[ringSel[0]]];let cur=ringSel[0];
    while(cur!==ringSel[1]){cur=(cur+1)%n;path.push(ringN[cur]);}
    ringPkt={x:ringN[ringSel[0]].x,y:ringN[ringSel[0]].y};
    setTimeout(()=>{tLog('Token zachycen! Vysílá se ('+( path.length-1)+' hopů)','warn');
      animPath(path,null,()=>{tLog('PC-'+dl+' přijal rámec, token uvolněn ✓','ok');topoStat('Doručeno!');ringSel=[];ringPkt=null;document.getElementById('topoSend').disabled=true;const c=document.getElementById('topoC');if(c)drawTopo(c.getContext('2d'),c.width,c.height,null);});
    },600);
  }
}

function topoFail(){
  const btn=document.getElementById('topoFail');
  if(topoMode==='star'){starFailed=!starFailed;if(starFailed){btn.textContent='Obnovit switch';btn.className='btn btn-ok';tLog('Switch selhal — CELÁ SÍŤ offline!','err');topoStat('Switch offline. Žádné PC nekomunikuje.');}else{btn.textContent='Simulovat výpadek';btn.className='btn btn-d';tLog('Switch obnoven.','ok');topoStat('Síť online.');}}
  else if(topoMode==='bus'){busFailed=!busFailed;if(busFailed){btn.textContent='Opravit sběrnici';btn.className='btn btn-ok';tLog('Sběrnice přerušena — celá síť offline!','err');topoStat('Sběrnice přerušena.');}else{btn.textContent='Simulovat výpadek';btn.className='btn btn-d';tLog('Sběrnice opravena.','ok');topoStat('Síť online.');}}
  else{ringFailed=!ringFailed;if(ringFailed){btn.textContent='Opravit kruh';btn.className='btn btn-ok';tLog('Kruh přerušen — celá síť offline!','err');topoStat('Kruh přerušen. Token nemůže obíhat.');}else{btn.textContent='Simulovat výpadek';btn.className='btn btn-d';tLog('Kruh opraven.','ok');topoStat('Síť online.');}}
  starSel=[];busSel=[];ringSel=[];document.getElementById('topoSend').disabled=true;
  const c=document.getElementById('topoC');if(c)drawTopo(c.getContext('2d'),c.width,c.height,null);
}

function drawPrvekCanvas(phase, progress){
  const c=document.getElementById('prvkyC');if(!c)return;
  const W=c.width,H=c.height;const ctx=c.getContext('2d');
  ctx.clearRect(0,0,W,H);ctx.setLineDash([]);

  const p=PRVKY_SIM.find(x=>x.id===selPrvek);if(!p)return;
  const isSwitch=selPrvek==='switch';
  const isRouter=selPrvek==='router';
  const isRepeater=selPrvek==='repeater';
  const isBroadcast=selPrvek==='hub'; // repeater: point-to-point regen

  // ── Layout ──────────────────────────────────────────────
  const cx=W/2, cy=H/2;

  const pcPositions = isRouter
    ? [{x:90,  y:cy,      l:'LAN',   sub:'192.168.1.x',  role:'src'},
       {x:W-90,y:cy,      l:'WAN',   sub:'Internet',     role:'dst'}]
    : isRepeater
    ? [{x:90,   y:cy,      l:'PC-A', sub:'odesílatel',   role:'src'},
       {x:W-90, y:cy,      l:'PC-B', sub:'příjemce',     role:'dst'}]
    : [{x:68,   y:48,      l:'PC-A', sub:'odesílatel',   role:'src'},
       {x:W-68, y:48,      l:'PC-B', sub:'',             role:'other'},
       {x:W-68, y:H-48,    l:'PC-C', sub:'',             role:'other'},
       {x:cx,   y:H-40,    l:'PC-D', sub:'příjemce',     role:'dst'},
       {x:68,   y:H-48,    l:'PC-E', sub:'',             role:'other'}];

  // Which ports are "lit" (data flows to them)
  // phase: null=idle, 0=src→device, 1=pause at device, 2=device→dst(s)
  const litSrc  = phase!==null;
  const litDsts = phase===2;
  const dstIdxs = (selPrvek==='hub') ? [1,2,3,4]
                : isRepeater  ? [1]
                : isSwitch    ? [3]
                : isRouter    ? [1]
                :               [3];

  // ── Cables ──────────────────────────────────────────────
  function cableColor(i){
    if(!litSrc) return '#bfdbfe';
    if(i===0 && phase<=1) return p.border;
    if(litDsts && dstIdxs.includes(i)) return p.border;
    return '#bfdbfe';
  }
  pcPositions.forEach((pc,i)=>{
    const active = (i===0 && litSrc && phase<=1) || (litDsts && dstIdxs.includes(i));
    ctx.beginPath();
    ctx.moveTo(cx,cy);ctx.lineTo(pc.x,pc.y);
    ctx.strokeStyle = active ? p.border : '#dbeafe';
    ctx.lineWidth = active ? 2.5 : 1.2;
    ctx.stroke();
  });

  // ── Central device ───────────────────────────────────────
  const devW = isRouter ? 94 : 84;
  const devH = isRouter ? 54 : 48;
  const devPulse = phase===1; // pulsing while processing
  if(devPulse){
    ctx.beginPath();ctx.roundRect(cx-devW/2-6,cy-devH/2-6,devW+12,devH+12,14);
    ctx.fillStyle=p.border+'22';ctx.fill();
  }
  ctx.beginPath();ctx.roundRect(cx-devW/2,cy-devH/2,devW,devH,9);
  ctx.fillStyle=p.col;ctx.fill();
  ctx.strokeStyle=devPulse?p.textC:p.border;ctx.lineWidth=devPulse?2.5:1.5;ctx.stroke();
  ctx.fillStyle=p.textC;
  ctx.font='700 11px Inter,system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.label.toUpperCase(),cx,cy-7);
  ctx.font='500 9px Inter,system-ui';ctx.fillStyle=p.textC+'bb';
  ctx.fillText(p.vrstva,cx,cy+7);

  // Processing label inside device when pausing
  if(devPulse && isSwitch){
    ctx.font='600 8px Inter,system-ui';ctx.fillStyle=p.textC;
    ctx.fillText('CAM lookup…',cx,cy+19);
  } else if(devPulse && isRouter){
    ctx.font='600 8px Inter,system-ui';ctx.fillStyle=p.textC;
    ctx.fillText('routing…',cx,cy+19);
  } else if(devPulse && isRepeater){
    ctx.font='600 8px Inter,system-ui';ctx.fillStyle=p.textC;
    ctx.fillText('regeneruje…',cx,cy+19);
  }

  // ── PC nodes ────────────────────────────────────────────
  const R = isRouter ? 24 : 17;
  pcPositions.forEach((pc,i)=>{
    const isSrc = pc.role==='src';
    const isDst = pc.role==='dst' && !isBroadcast;
    const isBcastDst = isBroadcast && pc.role!=='src';
    const highlight = isSrc || isDst || isBcastDst;
    const fill = isSrc?'#dcfce7' : isDst?'#dbeafe' : isBcastDst?'#eff6ff' : '#f8faff';
    const stroke = isSrc?'#16a34a' : isDst?'#1a56db' : isBcastDst?'#93c5fd' : '#bfdbfe';
    ctx.beginPath();ctx.arc(pc.x,pc.y,R,0,Math.PI*2);
    ctx.fillStyle=fill;ctx.fill();
    ctx.strokeStyle=stroke;ctx.lineWidth=highlight?2:1;ctx.stroke();
    ctx.fillStyle = isSrc?'#14532d' : isDst?'#1e40af' : '#6b7280';
    ctx.font='600 10px Inter,system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pc.l,pc.x,pc.y-(pc.sub?5:0));
    if(pc.sub){
      ctx.font='400 8px Inter,system-ui';ctx.fillStyle='#9ca3af';
      ctx.fillText(pc.sub,pc.x,pc.y+6);
    }
  });

  // ── Packet ──────────────────────────────────────────────
  if(phase===null||progress===null)return;

  function drawPkt(x,y,r,col,alpha){
    alpha=alpha||1;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=col.replace(')',`, ${alpha})`).replace('rgb','rgba').replace('#','rgba(').replace(/^rgba\(([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/i,(_,r,g,b)=>`rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)}`);
    // simpler:
    ctx.fillStyle=col;ctx.globalAlpha=alpha;ctx.fill();ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(x,y,r+6,0,Math.PI*2);
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.globalAlpha=alpha*0.25;ctx.stroke();ctx.globalAlpha=1;
  }

  const src=pcPositions[0];
  const ease=t=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; // easeInOut

  if(phase===0){
    // src → central device
    const t=ease(progress);
    const x=lerp(src.x,cx,t), y=lerp(src.y,cy,t);
    // For repeater: show signal getting weaker as it travels
    const alpha = isRepeater ? Math.max(0.3, 1-t*0.6) : 1;
    drawPkt(x,y,7,'#1a56db',alpha);
  } else if(phase===1){
    // pulsing at device — packet sits at center
    const pulse=0.5+0.5*Math.sin(progress*Math.PI*4);
    drawPkt(cx,cy,7+pulse*3,'#1a56db',0.6+0.4*pulse);
  } else if(phase===2){
    // device → destination(s)
    const t=ease(progress);
    if(isBroadcast){
      // all non-src nodes
      [1,2,3,4].forEach((di,i)=>{
        const dst=pcPositions[di];
        // stagger start slightly per port
        const delay=i*0.08;
        const lt=Math.max(0,Math.min(1,(t-delay)/(1-delay)));
        if(lt<=0)return;
        const x=lerp(cx,dst.x,lt), y=lerp(cy,dst.y,lt);
        drawPkt(x,y,6,'#3b82f6',0.7);
      });
    } else {
      const dst=pcPositions[dstIdxs[0]];
      const x=lerp(cx,dst.x,t), y=lerp(cy,dst.y,t);
      // For repeater: signal starts strong (freshly regenerated)
      const outAlpha = isRepeater ? Math.min(1, 0.6+t*0.4) : 1;
      drawPkt(x,y,7,'#1a56db',outAlpha);
    }
  }
}

function prvkySend(){
  const p=PRVKY_SIM.find(x=>x.id===selPrvek);if(!p)return;
  const btn=document.getElementById('prvkyBtn');if(btn)btn.disabled=true;
  const log=document.getElementById('prvkyLog');if(log)log.innerHTML='';
  prvkyAnimRunning=true;

  const SPEED=0.007;
  const PAUSE_MS=950;
  const tMap=['info','warn','ok','ok'];
  let stepIdx=0;

  function logNext(){
    if(!prvkyAnimRunning||stepIdx>=p.steps.length)return;
    prvkyPLog(p.steps[stepIdx],tMap[stepIdx]||'info');
    stepIdx++;
  }

  function runPhase0(){
    if(!prvkyAnimRunning)return;
    logNext();
    let prog=0;
    function anim(){
      if(!prvkyAnimRunning)return;
      prog+=SPEED;
      if(prog>=1){drawPrvekCanvas(0,1);setTimeout(runPhase1,100);return;}
      drawPrvekCanvas(0,prog);requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);
  }

  function runPhase1(){
    if(!prvkyAnimRunning)return;
    logNext();
    const start=performance.now();
    function pulse(){
      if(!prvkyAnimRunning)return;
      const t=(performance.now()-start)/PAUSE_MS;
      drawPrvekCanvas(1,Math.min(t,1));
      if(t<1)requestAnimationFrame(pulse);
      else{logNext();setTimeout(runPhase2,100);}
    }
    requestAnimationFrame(pulse);
  }

  function runPhase2(){
    if(!prvkyAnimRunning)return;
    let prog=0;
    function anim(){
      if(!prvkyAnimRunning)return;
      prog+=SPEED;
      if(prog>=1){
        drawPrvekCanvas(2,1);
        logNext();
        setTimeout(()=>{
          if(!prvkyAnimRunning)return;
          drawPrvekCanvas(null,0);
          if(btn)btn.disabled=false;
        },1400);
        return;
      }
      drawPrvekCanvas(2,prog);requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);
  }

  drawPrvekCanvas(0,0);
  setTimeout(runPhase0,200);
}

/* ══════════════════════════════════════
   LEKCE 9 — KVÍZ
══════════════════════════════════════ */
const QS=[
  {q:'Na které vrstvě OSI modelu pracuje switch (přepínač)?',opts:['Vrstva 1 — fyzická','Vrstva 2 — linková (Data Link)','Vrstva 3 — síťová','Vrstva 4 — transportní'],ans:1,exp:'Switch pracuje na vrstvě 2 (linkové). Pracuje s MAC adresami a CAM tabulkou. Hub je vrstva 1 (jen opakuje signál), router je vrstva 3 (IP adresy a směrování).'},
  {q:'Co je CSMA/CD a kde se používá?',opts:['Metoda šifrování WiFi sítí','Carrier Sense Multiple Access/Collision Detection — metoda přístupu k médiu v Ethernetu','Token passing metoda pro RING sítě','Protokol pro přidělování IP adres'],ans:1,exp:'CSMA/CD = před odesláním uzel naslouchá (Carrier Sense), při kolizi detekuje problém (Collision Detection), čeká náhodnou dobu a zkouší znovu. Používá se v Ethernetu na sdíleném médiu (BUS topologie).'},
  {q:'Co obsahuje CAM tabulka ve switchi?',opts:['IP adresy a gateway','MAC adresy a odpovídající porty','DNS záznamy domén','Routovací metriky pro pakety'],ans:1,exp:'CAM (Content Addressable Memory) tabulka mapuje MAC adresy na fyzické porty switche. Switch ji buduje dynamicky — při příchodu rámce si zapamatuje zdrojovou MAC adresu a port, ze kterého přišla.'},
  {q:'Proč BUS topologie potřebuje terminátory na koncích kabelu?',opts:['Zvyšují přenosovou rychlost','Zabraňují odrazu signálu, který by způsobil interference','Napájejí připojená zařízení','Slouží jako záložní přístupový bod'],ans:1,exp:'Bez terminátorů (50 Ω) by se signál na konci kabelu odrazil zpět a interferoval s přicházejícími daty. Terminátory signál pohltí a zabrání odrazu. Jejich absence způsobí nefunkčnost celé sítě.'},
  {q:'Jaká je maximální délka kabelu UTP Cat5 pro Ethernet?',opts:['10 m','50 m','100 m','500 m'],ans:2,exp:'Maximální délka segmentu kroucené dvojlinky (UTP Cat5) pro Ethernet je 100 metrů. Pro překonání větší vzdálenosti je nutné použít opakovač (repeater) nebo switch.'},
  {q:'Jaký protokol automaticky přiděluje IP adresy v síti?',opts:['DNS','ARP','DHCP','NAT'],ans:2,exp:'DHCP (Dynamic Host Control Protocol) automaticky přiděluje počítačům IP adresu, masku podsítě, výchozí bránu a DNS server. Komunikace probíhá: DISCOVER → OFFER → REQUEST → ACK.'},
  {q:'Co je to SPOF (Single Point of Failure)?',opts:['Speciální protokol pro WiFi','Jediný bod, jehož výpadek způsobí výpadek celé sítě','Typ ethernetového kabelu','Metoda šifrování v HTTPS'],ans:1,exp:'SPOF = jediný prvek, jehož selhání způsobí výpadek celého systému nebo sítě. Ve STAR topologii je SPOF switch/hub. V BUS topologii je SPOF kabelová přerušení. Mesh topologie SPOF eliminuje.'},
  {q:'Který protokol zajišťuje šifrovaný přenos webových stránek?',opts:['HTTP (port 80)','FTP (port 21)','HTTPS (port 443)','SMTP (port 25)'],ans:2,exp:'HTTPS (HTTP Secure) šifruje komunikaci pomocí SSL/TLS certifikátu. Základem je výměna veřejných klíčů podepsaných certifikační autoritou (CA). Nezbytný pro e-shopy, banky, přihlašovací formuláře.'},
  {q:'Jaký je rozdíl mezi POP3 a IMAP pro e-mail?',opts:['POP3 je bezpečnější než IMAP','POP3 stahuje e-maily na lokální počítač, IMAP nechává poštu na serveru a umožňuje přístup z více zařízení','IMAP se používá pro odesílání, POP3 pro příjem','Žádný rozdíl, jsou to synonyma'],ans:1,exp:'POP3 stáhne e-maily ze serveru do lokálního klienta — vhodné pro jedno zařízení. IMAP nechává e-maily na serveru a synchronizuje stav (přečteno, složky) — vhodné pro přístup z více zařízení (PC, mobil, webmail).'},
  {q:'Co přidává IPv6 oproti IPv4?',opts:['Rychlejší přenos dat','Výrazně větší adresní prostor (128 bitů místo 32 bitů) řešící vyčerpání IPv4 adres','Lepší šifrování paketů','Odstranění potřeby DNS'],ans:1,exp:'IPv6 používá 128bitové adresy místo 32bitových IPv4. To představuje 10³⁸ adres — prakticky nevyčerpatelný prostor. IPv6 také přináší autokonfiguraci, efektivnější směrování a vestavěnou podporu bezpečnosti (IPsec).'},
];

let qI=0,qDone=false;
let qShuffledOpts=[];  // per-question shuffled option indices

function shuffle(arr){
  const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}
function initQuizOrder(){
  qOrder=shuffle(QS.map((_,i)=>i));
  // For each question, shuffle its options and track the new correct-answer index
  qShuffledOpts=qOrder.map(qi=>{
    const q=QS[qi];
    const idxs=shuffle(q.opts.map((_,i)=>i));
    return idxs; // idxs[newPos] = originalIdx; correct is where idxs[newPos]===q.ans
  });
  saveState();
}
function curQ(){return QS[qOrder[qI]];}
function curOpts(){
  const q=curQ(),idxs=qShuffledOpts[qI];
  return idxs.map(i=>q.opts[i]);
}
function curCorrectNew(){
  const q=curQ(),idxs=qShuffledOpts[qI];
  return idxs.indexOf(q.ans);
}

function bQuiz(){return`<div id="qBox"></div>`;}
function postRenderQuiz(){
  qI=0;qDone=false;qResults=[];
  if(qOrder.length!==QS.length)initQuizOrder();
  renderQ();
}

function renderQ(){
  const box=document.getElementById('qBox');if(!box)return;
  if(qI>=QS.length){renderQuizResults(box);return;}
  const q=curQ(),opts=curOpts(),pct=Math.round(qI/QS.length*100);
  box.innerHTML=`
    <div class="q-prog-wrap"><div class="q-prog" style="width:${pct}%"></div></div>
    <div class="q-meta">Otázka ${qI+1} z ${QS.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="q-opts">${opts.map((o,i)=>`<button class="q-opt" id="qo${i}" onclick="qAns(${i})">${o}</button>`).join('')}</div>
    <div id="qExp" class="q-exp" style="display:none"></div>
    <button id="qNxt" class="btn btn-p" style="display:none" onclick="qI++;qDone=false;renderQ()">Další otázka →</button>`;
}

function qAns(i){
  if(qDone)return;qDone=true;
  const correct=curCorrectNew();
  const isRight=(i===correct);
  qResults.push(isRight);
  for(let j=0;j<curOpts().length;j++){
    const b=document.getElementById('qo'+j);b.disabled=true;
    if(j===correct)b.classList.add('correct');
    else if(j===i)b.classList.add('wrong');
  }
  document.getElementById('qExp').style.display='block';
  document.getElementById('qExp').textContent=curQ().exp;
  document.getElementById('qNxt').style.display='inline-block';
}

function renderQuizResults(box){
  saveState();
  const sc=qResults.filter(r=>r).length;
  const wrongItems=qResults.map((r,i)=>r?null:{qi:qOrder[i],newOpts:qShuffledOpts[i]}).filter(Boolean);
  const grade=sc===QS.length?'Výborně! Perfektní skóre.':sc>=8?'Skvělá práce! Drobné mezery.':sc>=6?'Dobrý základ — projdi chybné odpovědi níže.':'Doporučujeme projít kurz znovu.';

  const wrongHTML=wrongItems.length===0?'':`
    <div style="text-align:left;margin-top:1.25rem">
      <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--sec);margin-bottom:.75rem">Chybné odpovědi — správná řešení</div>
      ${wrongItems.map(({qi,newOpts})=>{
        const q=QS[qi];
        const correctOrig=q.opts[q.ans];
        return`<div style="background:var(--red-bg);border:1px solid var(--red-b);border-radius:var(--r);padding:.75rem 1rem;margin-bottom:.5rem">
          <div style="font-size:13px;font-weight:600;color:var(--red-t);margin-bottom:4px">${q.q}</div>
          <div style="font-size:12px;color:var(--green-m)">✓ ${correctOrig}</div>
          <div style="font-size:12px;color:var(--sec);margin-top:4px;line-height:1.5">${q.exp}</div>
        </div>`;
      }).join('')}
    </div>`;

  box.innerHTML=`<div class="complete">
    <div class="complete-star">★</div>
    <div class="complete-score">${sc} / ${QS.length}</div>
    <div style="display:flex;gap:4px;justify-content:center;margin-bottom:.75rem;flex-wrap:wrap">
      ${qResults.map((r,i)=>`<span class="qdot ${r?'ok':'bad'}" title="${QS[qOrder[i]].q.slice(0,40)}…"></span>`).join('')}
    </div>
    <div class="complete-sub">${grade}</div>
    <button class="btn btn-p" onclick="qI=0;qDone=false;qResults=[];initQuizOrder();renderQ()">Zkusit znovu (nové pořadí)</button>
    ${wrongHTML}
  </div>`;
}

/* ══════════════════════════════════════
   COMPLETION SCREEN
══════════════════════════════════════ */
function renderComplete(){
  const sc=qResults.filter(r=>r).length;
  document.getElementById('lessonCard').innerHTML=`
    <div class="lbody">
      <div class="complete">
        <div class="complete-star">★</div>
        <div class="complete-title">Kurz dokončen!</div>
        <div class="complete-score">${sc} / ${QS.length} v kvízu</div>
        <div class="complete-sub">Prošel jsi celý kurz — od fyzické vrstvy a topologií přes aktivní prvky, protokoly a adresování až po internet a jeho služby. Gratuluji!</div>
        <button class="btn btn-p" onclick="restart()">Začít kurz znovu</button>
      </div>
    </div>`;
}

function showToast(msg,ms=2800){
  const t=document.getElementById('toast');if(!t)return;
  t.textContent=msg;t.style.display='block';t.style.opacity='1';
  clearTimeout(t._to);
  t._to=setTimeout(()=>{t.style.opacity='0';setTimeout(()=>{t.style.display='none';},300);},ms);
}
function confirmReset(){
  if(done.size===0&&curL===0){showToast('Žádný postup k resetování.');return;}
  if(confirm('Opravdu resetovat celý postup? Tato akce nelze vrátit zpět.')){
    restart();showToast('Postup byl resetován.');
  }
}
function restart(){curL=0;done.clear();qResults=[];qI=0;qOrder=[];clearState();render();updateProg();window.scrollTo({top:0,behavior:'smooth'});}

/* ══════════════════════════════════════
   POST RENDER DISPATCH
══════════════════════════════════════ */
function postRender(id){
  if(id==='topo'){postRenderTopo();}
  else if(id==='eth'){postRenderEth();}
  else if(id==='prvky'){postRenderPrvky();}
  else if(id==='osi'){postRenderOsi();}
  else if(id==='quiz'){postRenderQuiz();}
}

/* INIT */
loadState();
updateProg();render();
if(done.size>0)showToast('Vítej zpět! Postup byl obnoven (' + done.size + '/' + LESSONS.length + ' lekcí).');
</script>
